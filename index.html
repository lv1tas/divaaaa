<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shaggy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,sans-serif;
}

body{
    background:#090909;
    color:white;
    overflow:hidden;
}

canvas{
    position:fixed;
    inset:0;
    z-index:-1;
}

nav{
    width:100%;
    padding:30px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:2rem;
    font-weight:900;
    letter-spacing:3px;
}

nav ul{
    display:flex;
    gap:40px;
    list-style:none;
}

nav a{
    text-decoration:none;
    color:white;
    transition:.3s;
}

nav a:hover{
    color:#00d4ff;
}

.hero{
    height:85vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    flex-direction:column;
}

.hero h1{
    font-size:7rem;
    font-weight:900;
    opacity:0;
    transform:translateY(50px);
    animation:title 1s forwards;
}

.hero p{
    margin-top:20px;
    font-size:1.3rem;
    color:#cfcfcf;
    opacity:0;
    animation:fade 1s .6s forwards;
}

button{
    margin-top:40px;
    padding:18px 40px;
    border:none;
    border-radius:40px;
    background:#00d4ff;
    color:black;
    font-weight:700;
    font-size:1rem;
    cursor:pointer;
    transition:.35s;
}

button:hover{
    transform:translateY(-6px) scale(1.05);
    box-shadow:0 0 40px #00d4ff;
}

.scroll{
    position:absolute;
    bottom:40px;
    animation:bounce 2s infinite;
    color:#aaa;
}

@keyframes title{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes fade{
    to{
        opacity:1;
    }
}

@keyframes bounce{
    50%{
        transform:translateY(12px);
    }
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>

<div class="logo">SHAGGY</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Clips</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Contact</a></li>
</ul>

</nav>

<section class="hero">

<h1>SHAGGY</h1>

<p>Streamer • Fighter • Content Creator</p>

<button>Watch My Clips</button>

<div class="scroll">▼ Scroll</div>

</section>

<script>

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.onresize=resize;

const particles=[];

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-.5)*0.6,
dy:(Math.random()-.5)*0.6
});
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.x+=p.dx;
p.y+=p.dy;

if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;

ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fillStyle="#00d4ff";
ctx.fill();

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
